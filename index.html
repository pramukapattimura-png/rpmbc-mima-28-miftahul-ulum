    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://i.imgur.com/jVhaHGc.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .gradient-bg {
            background: radial-gradient(circle, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
        }
        .green-primary {
            background-color: #064e3b;
        }
        .green-gradient {
            background: linear-gradient(to right, #064e3b, #4ade80, #064e3b);
        }
        @media print {
            .no-print { display: none !important; }
            .print-page { padding: 0 !important; margin: 0 !important; }
            .page-break { page-break-after: always; }
        }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #064e3b; line-height: 1.3; }
        .markdown-body p { margin-bottom: 1.25rem; line-height: 1.5; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1.25rem; line-height: 1.5; }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 1.5rem; font-size: 0.875rem; border: 1px solid #334155; line-height: 1.4; }
        .markdown-body th, .markdown-body td { border: 1px solid #334155; padding: 0.75rem; text-align: left; }
        .markdown-body th { background-color: #f1f5f9; font-weight: 700; color: #0f172a; }
        .markdown-body tr:nth-child(even) { background-color: #f8fafc; }
        .markdown-body blockquote { border-left: 4px solid #064e3b; padding-left: 1rem; color: #475569; font-style: italic; margin-bottom: 1rem; }
    </style>
